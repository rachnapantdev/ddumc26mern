<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <script>
        let sname, h,e,m,s,c, total, avg, sstatus;
        sname= prompt("Enter the name ");
        h= parseInt(prompt('Enter Hindi Marks '))
        e= parseInt(prompt('Enter English Marks '))
        m= parseInt(prompt('Enter Math Marks '))
        s= parseInt(prompt('Enter Science Marks '))
        c= parseInt(prompt('Enter Computer Marks '))
        total = h+e+m+s+c;
       avg=total/5;
        sstatus = (avg>=60)?"Pass":"Fail";

        document.write(`<table border="1" width="100%">
            <thead>
                <tr>
                    <th> Name </th>
                    <th> Hindi </th>
                    <th> English </th>
                    <th> Math </th>
                    <th> Science </th>
                    <th> Computer </th>
                    <th> Total </th>
                    <th> Avg </th>
                    <th> Status </th>
                    
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td> ${sname} </td>
                    <td> ${h} </td>
                    <td> ${e} </td>
                    <td> ${m} </td>
                    <td> ${s} </td>
                    <td> ${c} </td>
                    <td> ${total} </td>
                    <td> ${avg} </td>
                    <td style="color: ${avg>=60? 'green' : 'red'}"> ${sstatus} </td>
                    
                </tr>
            </tbody>
    </table>`)

    </script>
</body>
</html>
