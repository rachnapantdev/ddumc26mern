<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="timer"> 
        Current Time 
    </div>
    <script>
        setInterval(()=>{
            let d = new Date();
            document.getElementById("timer").innerText = d.toLocaleTimeString();
            console.log(d.toLocaleString())
        }, 1000)
    </script>
</body>
</html>
